<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeskCheck</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <p id="status"></p>
    <fieldset id="pii-mode-fieldset">
      <legend>Capture inputs</legend>
      <label><input type="radio" name="pii-mode" value="full" checked> Full <span class="hint">values</span></label>
      <label><input type="radio" name="pii-mode" value="metadata"> Metadata <span class="hint">length only</span></label>
      <label><input type="radio" name="pii-mode" value="none"> None <span class="hint">skip inputs</span></label>
    </fieldset>
    <button id="start-btn">Start Session</button>
    <button id="download-btn" class="hidden">Download Report</button>
  </div>
  <script type="module" src="popup.ts"></script>
</body>
</html>
